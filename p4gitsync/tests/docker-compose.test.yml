services:
  p4d:
    image: perforce/helix-core:latest
    ports:
      - "1666:1666"
    environment:
      - P4PORT=1666
    volumes:
      - ./fixtures:/fixtures

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  git-server:
    image: gitea/gitea:latest
    ports:
      - "3000:3000"
      - "2222:22"
    environment:
      - GITEA__database__DB_TYPE=sqlite3
